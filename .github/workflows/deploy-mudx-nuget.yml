name: Deploy MudX Nuget

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g., v8.9.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy-nuget:
    name: Deploy MudX NuGet to nuget.org
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.version }}
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0  # Ensure tags and full history are available

      - name: Extract version number
        run: |
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Ensure tag exists (create if missing)
        run: |
          git fetch --tags
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Creating tag $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Update <Version> in csproj
        run: |
          sed -i 's|\(<Version>\)[^<]*\(</Version>\)|\1${{ env.VERSION }}\2|' ./src/MudX/MudX.csproj

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Run Generator for StaticAssets
        run: |
          dotnet build ./src/MudX.Generator --configuration Release --framework net8.0 --verbosity normal
          dotnet run --project ./src/MudX.Generator --configuration Release --framework net8.0 -- ./src/MudX/wwwroot ./src/MudX/Scripts
        
      - name: Pack NuGet package
        run: dotnet pack -c Release --output nupkgs /p:Version=${{ env.VERSION }}
        working-directory: ./src/MudX

      - name: Check package contains static assets
        shell: pwsh
        run: |
          $files = @("mudx.min.css", "mudx.min.js", "prism.js", "mudxProvider.js")
          $nupkg = Get-ChildItem ./src/MudX/nupkgs/*.nupkg | Where-Object { $_.Name -notlike "*.symbols.nupkg" } | Select-Object -First 1
          ./tools/CheckStaticAssets.ps1 $nupkg.FullName $files

      - name: Push NuGet package and symbols
        run: |
          pushed=$(dotnet nuget push nupkgs/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate)
          echo "$pushed"
          if [[ "$pushed" != *"already exists"* ]]; then
            echo "Main package uploaded, pushing symbols..."
            dotnet nuget push nupkgs/*.snupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "Skipping symbols — main package already exists."
          fi

      - name: Commit and push updated MudX.csproj Version info
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./src/MudX/MudX.csproj
          git commit -m "Update version to $VERSION"
          git push origin dev

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG }}" \
            --repo "${{ github.repository }}" \
            --title "MudX ${TAG#v}" \
            --generate-notes \
            ./src/MudX/nupkgs/*.nupkg \
            ./src/MudX/nupkgs/*.snupkg

      - name: Show updated csproj version
        run: grep '<Version>' ./src/MudX/MudX.csproj
