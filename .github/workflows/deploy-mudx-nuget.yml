name: Deploy MudX Nuget

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g., v8.9.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy-nuget:
    name: Deploy MudX NuGet to nuget.org
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.version }}
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0  # Ensure tags and full history are available

      - name: Extract version number
        run: |
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Ensure tag exists (create if missing)
        run: |
          git fetch --tags
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Creating tag $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Update <Version> in csproj
        run: |
          sed -i 's|\(<Version>\)[^<]*\(</Version>\)|\1${{ env.VERSION }}\2|' ./src/MudX/MudX.csproj

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
        
      - name: Pack NuGet package
        run: dotnet pack -c Release --output nupkgs /p:Version=${{ env.VERSION }}
        working-directory: ./src/MudX

      - name: Check package contains static assets
        shell: pwsh
        run: |
          $files = @("mudx.min.css", "mudx.min.js", "prism.js")
          ./CheckPackageContainsStaticAssets.ps1 ./src/MudX/nupkgs $files
        working-directory: ./tools

      - name: Publish NuGet package
        run: dotnet nuget push nupkgs/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: ./src/MudX

      - name: Push symbol package
        run: dotnet nuget push nupkgs/*.snupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: ./src/MudX

      - name: Commit and push updated version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./src/MudX/MudX.csproj
          git commit -m "Update version to $VERSION"
          git push origin dev

      - name: Show updated csproj version
        run: grep '<Version>' ./src/MudX/MudX.csproj
